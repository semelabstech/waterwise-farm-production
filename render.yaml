services:
  - type: web
    name: waterwise-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend_api.server:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
