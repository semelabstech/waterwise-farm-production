services:
  - type: web
    name: waterwise-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend_api.server:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
