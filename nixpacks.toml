providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases."node:setup"]
nixPkgs = []

[phases.install]
cmds = [
    "python3 -m pip install -r requirements.txt",
    "cd frontend && npm install"
]

[phases.build]
cmds = [
    "cd frontend && npm run build"
]

[start]
cmd = "python3 backend_api/server.py"
